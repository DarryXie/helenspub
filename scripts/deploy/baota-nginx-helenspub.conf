server {
    listen 80;
    server_name helenspub.xyz;
    root /www/wwwroot/helenspub/www;
    index index.html;

    client_max_body_size 10m;

    access_log /www/wwwlogs/helenspub.log;
    error_log /www/wwwlogs/helenspub.error.log;

    location = / {
        return 302 /menu/;
    }

    location = /admin {
        return 301 /admin/;
    }

    location = /menu {
        return 301 /menu/;
    }

    location = /staff {
        return 301 /staff/;
    }

    location ^~ /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    location ^~ /menu/ {
        try_files $uri $uri/ /menu/index.html;
    }

    location ^~ /staff/ {
        try_files $uri $uri/ /staff/index.html;
    }

    location ^~ /uploads/ {
        alias /www/wwwroot/helenspub/uploads/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ^~ /api/v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

